dataset_root: /home/li325/qing_workspace/dataset/AGD20K/AGD20K/Unseen/testset
model_dir: /home/li325/qing_workspace/model_for_test/FLUX.1-Kontext-dev
output_root: ./outputs
num_inference_steps: 20
guidance_scale: 2.5
seed: 3
height: null   # 默认使用模型自适应尺寸; 设置数值可覆盖 (需为16倍数)
width: null
match_input_resolution: true  # 若为 true, 根据原图尺寸自动匹配 Kontext 推荐分辨率
gpus: ["cuda:0"]
affordances: null
  #- sip
  # 若需子集评估，列出 ['hold', 'cut', ...]
max_images_per_object: null  # 可设置为整数限制每个物体的样本数
token_selection: "auto"  # auto: 根据 prompt_templates 中的 token 列表匹配
save_intermediate: false  # 若为 true 保存 kontext 中间日志
resume: true  # 若存在 outputs/<exp_id>，决定是否跳过已完成样本
resume_run_dir: /home/li325/qing_workspace/exps/affordance-experiments/FLUX/AGD20K_Flux_unseen/outputs/20260128-152904  # 可选：指定已有输出目录（绝对或相对 output_root）用于断点续跑

geom_pipeline:
  enable: true
  dino_backend: dinov3  # dinov3 | dinov2
  dino_target_wh: null  # e.g. [1260, 980] for DINOv2; null uses backend default
  dino_patch_size: null # e.g. 14 for DINOv2; null uses backend default
  dino_cache_only: true # require cache hit; avoids loading DINO model on GPU
  cache_root: ./cache
  roi_percentile: 80.0
  token_threshold: 0.1
  disable_object_roi: false
  pca_components: 5
  geom_sigma: 1.2
  geom_threshold: 0.7
  geom_soft_fusion: true
  geom_soft_lambda: 0.65
  geom_soft_gamma: 0.7
  geom_soft_temperature: [0.30, 0.40, 0.50, 0.60]
  geom_soft_base: 0
  geom_soft_log1p: false
  geom_sim_use_nss: true
  geom_sim_topk_percent: 5.0
  geom_sim_nss_weight: 1.0
  geom_sim_topk_weight: 0.0
  fusion_thresholds: [0.30, 0.40, 0.50]
  keep_largest: true
