dataset:
  root: /home/li325/qing_workspace/dataset/UMD/part-affordance-dataset
  split_path: exps/affordance-experiments/umd_linear_probing/metadata/splits/category_split_seed42_v20.json
  patch_size: 16
  num_classes: 8
  ignore_index: 255
  min_patch_coverage: 0.55
  exclude_background: false
  metric_ignore_indices: [0]
  pad_to_patch_multiple: true
  geometry:
    manifest_path: /home/li325/qing_workspace/exps/affordance-experiments/umd_linear_probing/metadata/splits/metric3d_train_predictions.json
    use_depth: false
    use_normal: true
    normalization:
      mode: per_image_percentile
      depth:
        percentiles: {low: 2.0, high: 98.0}
    pool: {kernel: 16, stride: 16}

model:
  target: flux
  params:
    model_dir: /home/li325/qing_workspace/model_for_test/FLUX.1-dev
    flow_checkpoint: flux1-dev.safetensors
    ae_checkpoint: ae.safetensors
    layers_to_hook: ["double_3", "double_8", "double_13", "double_18"]
    primary_layer: double_3
    head:
      type: multi_layer_linear
      feature_keys: ["double_3", "double_8", "double_13", "double_18"]
      primary_key: double_3
      fuse_mode: concat
      use_batchnorm: true
      dropout: 0.0
    time_step: 1
    guidance_strength: 1.0
    disable_guidance: false
    output_dir_name: flux_nomrl

training:
  batch_size: 4
  num_workers: 4
  max_epochs: 2
  patience: 1
  lr_grid: [0.001]
  weight_decay_grid: [0.01]
  # lr_grid: [0.0001]
  # weight_decay_grid: [0.0001]
  grad_clip_norm: 1.0
  eval_interval: 1
  log_interval: 100
  val_log_interval: 100
  device: cuda
  precision: bf16
  output_root: outputs
  seed: 1337
  accumulate_grad_batches: 1
