# Default configuration for affordance linear probing experiments.

dataset:
  root: ../../dataset/UMD/part-affordance-dataset
  split_path: metadata/splits/category_split_seed42_v20.json
  patch_size: 16
  num_classes: 8
  ignore_index: 255
  min_patch_coverage: 0.55
  exclude_background: false
  class_names: [background, grasp, cut, scoop, contain, pound, support, wrap-grasp]
  metric_ignore_indices: [0]
  pad_to_patch_multiple: false

model:
  target: dinov3
  config_path: configs/models/dinov3.yaml
  overrides: {}

training:
  batch_size: 4
  num_workers: 4
  max_epochs: 2
  patience: 1
  lr_grid: [0.001]
  weight_decay_grid: [0.01]
  # lr_grid: [0.0001]
  # weight_decay_grid: [0.0001]
  grad_clip_norm: 1.0
  eval_interval: 1
  log_interval: 100
  val_log_interval: 100
  device: cuda
  precision: bf16
  output_root: outputs
  seed: 1337
  accumulate_grad_batches: 1
