model_dir: /home/li325/qing_workspace/model_for_test/FLUX.1-Kontext-dev
output_root: ./outputs
num_inference_steps: 20
guidance_scale: 2.5
seed: 3
height: null   # Use model-adaptive size by default; override with an integer multiple of 16
